<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
    }
    body {
      min-width: 300px;
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1f1f1f;
      padding: 16px;
      display: flex;
      flex-direction: column;
    }
    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h2 .logo { width: 20px; height: 20px; }
    .popout-btn {
      margin-left: auto;
      font-size: 14px;
      color: #999;
      text-decoration: none;
      padding: 2px 4px;
      border-radius: 4px;
    }
    .popout-btn:hover { color: #555; background: #eee; }
    .section { margin-bottom: 14px; flex: 1; display: flex; flex-direction: column; }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 6px;
    }
    .drop-zone {
      border: 2px dashed #ccc;
      border-radius: 6px;
      padding: 20px;
      text-align: center;
      color: #888;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: #f60;
      background: #fff8f0;
    }
    .drop-zone.has-file {
      border-color: #4caf50;
      background: #f0faf0;
      color: #333;
    }
    .file-input { display: none; }
    textarea {
      width: 100%;
      height: 100px;
      flex: 1;
      font-family: "SF Mono", Menlo, Monaco, monospace;
      font-size: 11px;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px;
      resize: vertical;
    }
    .or-divider {
      text-align: center;
      color: #aaa;
      font-size: 11px;
      margin: 8px 0;
    }
    button {
      width: 100%;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-import {
      background: #f60;
      color: #fff;
    }
    .btn-import:hover { background: #e55a00; }
    .btn-import:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .export-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .btn-export {
      flex: 1;
      background: #e8e8e8;
      color: #333;
    }
    .btn-export:hover { background: #ddd; }
    .btn-copy {
      width: 36px;
      flex-shrink: 0;
      background: #e8e8e8;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-copy:hover { background: #ddd; }
    .btn-copy svg { width: 16px; height: 16px; }
    .status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .status.success { display: block; background: #e8f5e9; color: #2e7d32; }
    .status.error { display: block; background: #fbe9e7; color: #c62828; }
    .filename {
      font-weight: 600;
      font-size: 12px;
      word-break: break-all;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1e; color: #ddd; }
      .section-label { color: #aaa; }
      .drop-zone { border-color: #555; color: #999; }
      .drop-zone:hover, .drop-zone.dragover { border-color: #f60; background: #2a1a00; }
      .drop-zone.has-file { border-color: #4caf50; background: #1a2e1a; color: #ccc; }
      textarea { background: #2a2a2a; color: #ddd; border-color: #555; }
      .or-divider { color: #666; }
      .btn-import { background: #f60; color: #fff; }
      .btn-import:hover { background: #e55a00; }
      .btn-import:disabled { background: #444; color: #777; }
      .btn-export, .btn-copy { background: #333; color: #ccc; }
      .btn-export:hover, .btn-copy:hover { background: #444; }
      .popout-btn { color: #666; }
      .popout-btn:hover { color: #ccc; background: #333; }
      .status.success { background: #1a2e1a; color: #6ecf6e; }
      .status.error { background: #2e1a1a; color: #ef6e6e; }
    }
  </style>
</head>
<body>
  <h2>
    <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="24" height="24" rx="4" fill="#F46800"/>
      <path d="M7 8h10M7 12h10M7 16h6" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
    Grafana Dashboard Import
    <a href="#" id="popoutBtn" class="popout-btn" title="Open in a window (for drag-and-drop)">&#x2197;</a>
  </h2>

  <div class="section">
    <div class="section-label">Import JSON</div>
    <div class="drop-zone" id="dropZone">
      Drop a JSON file here or click to browse
    </div>
    <input type="file" class="file-input" id="fileInput" accept=".json,application/json">

    <div class="or-divider">- or paste JSON below -</div>
    <textarea id="jsonInput" placeholder='{"title": "My Dashboard", "panels": [...], ...}'></textarea>
  </div>

  <button class="btn-import" id="importBtn" disabled>Import &amp; Reload</button>
  <div class="export-row">
    <button class="btn-export" id="exportBtn">Export Current Dashboard</button>
    <button class="btn-copy" id="copyBtn" title="Copy dashboard JSON to clipboard">📋</button>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
